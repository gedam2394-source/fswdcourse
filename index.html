<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Stack Developers Program</title>

<!-- INTERNAL CSS -->

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background-color:#f4f6f9;
}

/* Navbar */

.navbar{
background-color:#111827;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar ul{
list-style:none;
display:flex;
gap:20px;
}

.navbar li{
cursor:pointer;
}

/* Hero Section */

.hero{
background:linear-gradient(135deg,#6366f1,#3b82f6);
color:white;
text-align:center;
padding:80px 20px;
}

.hero button{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:30px;
background:white;
color:#3b82f6;
font-size:16px;
cursor:pointer;
}

/* Cards */

.cards{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.card{
background:white;
padding:25px;
width:220px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* Form Section */

.form-section{
background:white;
width:400px;
margin:40px auto;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
}

.form-section input,
.form-section select{
width:100%;
padding:10px;
margin:10px 0;
}

.form-section button{
width:100%;
padding:12px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

/* Footer */

footer{
background-color:#111827;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav class="navbar">
<h1>FSWD</h1>

<ul>
<li>Home</li>
<li>Course</li>
<li>Register</li>
</ul>

</nav>

<!-- Hero Section -->

<section class="hero">

<h2>Become a Full Stack Developer</h2>

<p>Learn frontend and backend development from scratch</p>

<button>Get Started</button>

</section>

<!-- Cards Section -->

<section class="cards">

<div class="card">
<h3>Frontend</h3>
<p>HTML, CSS, JavaScript, React</p>
</div>

<div class="card">
<h3>Backend</h3>
<p>Node.js, Express, MongoDB</p>
</div>

<div class="card">
<h3>Career</h3>
<p>Projects, Internship & Job Support</p>
</div>

</section>

<!-- Form Section -->

<section class="form-section">

<h2>Join the Course</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Email Address" required>

</form>

</section>

</body>
</html>
<section>
<select>
<option value="">Select Track</option>
<option>Frontend</option>
<option>Backend</option>
<option>Full Stack</option>
</select>

<button type="submit">Enroll Now</button>
</form>
</section>

<!-- Footer -->

<footer>
<p>©️ 2026 Full Stack Developer Program</p>
</footer>

</body>
</html>
